name: Processar Solicitacoes SGE

"on":
  workflow_dispatch:
    inputs:
      escola:
        description: Escola para executar manualmente (opcional)
        required: false
        default: ""
        type: string
      dry_run:
        description: Executa sem enviar ao SGE
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  schedule:
    - cron: "*/10 * * * *"

jobs:
  processar:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Ensure Playwright package
        run: python -m pip install playwright

      - name: Validate required secrets
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          ROOT_PAGE_ID: ${{ secrets.ROOT_PAGE_ID }}
          SGE_CPF: ${{ secrets.SGE_CPF }}
          SGE_SENHA: ${{ secrets.SGE_SENHA }}
        run: |
          MISSING=""
          if [ -z "$NOTION_TOKEN" ]; then MISSING="$MISSING NOTION_TOKEN"; fi
          if [ -z "$ROOT_PAGE_ID" ]; then MISSING="$MISSING ROOT_PAGE_ID"; fi
          if [ -z "$SGE_CPF" ]; then MISSING="$MISSING SGE_CPF"; fi
          if [ -z "$SGE_SENHA" ]; then MISSING="$MISSING SGE_SENHA"; fi

          if [ -n "$MISSING" ]; then
            echo "Error: missing required secrets:$MISSING"
            exit 1
          fi

      - name: Install Playwright browser
        run: python -m playwright install chromium

      - name: Process requests from Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          ROOT_PAGE_ID: ${{ secrets.ROOT_PAGE_ID }}
          SGE_CPF: ${{ secrets.SGE_CPF }}
          SGE_SENHA: ${{ secrets.SGE_SENHA }}
          SGE_LOGIN_URL: ${{ secrets.SGE_LOGIN_URL }}
          HEADLESS: "1"
          DRY_RUN: ${{ github.event.inputs.dry_run || 'true' }}
          MANUAL_ESCOLA: ${{ github.event.inputs.escola || '' }}
        run: python processar_solicitacoes_github.py
