name: Lancar Notas SGE

on:
  workflow_dispatch:
    inputs:
      escola:
        description: Escola alvo
        required: false
        default: "Todas"
        type: choice
        options:
          - "Todas"
          - "Juvenal"
          - "Arapongas"
          - "Mulde"
          - "Anna Alves"
          - "Tancredo"
          - "Maria Helena"
      turno:
        description: Turno alvo
        required: false
        default: "Todos"
        type: choice
        options:
          - "Todos"
          - "Matutino"
          - "Vespertino"
      turma:
        description: Turma alvo
        required: false
        default: "Todas"
        type: choice
        options:
          - "Todas"
          - "6º Ano"
          - "7º Ano"
          - "8º Ano"
          - "9º Ano"
      trimestre:
        description: Trimestre alvo
        required: false
        default: "Todos"
        type: choice
        options:
          - "Todos"
          - "1º Trimestre"
          - "2º Trimestre"
          - "3º Trimestre"
      notion_page_id:
        description: Page ID da linha de solicitacao no Notion (opcional; vazio busca automaticamente pela escola)
        required: false
        type: string
      sge_login_url:
        description: URL completa da pagina de login do SGE (opcional; sobrescreve o secret)
        required: false
        type: string
      dry_run:
        description: Executa sem enviar ao SGE
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  lancar:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Ensure Playwright package
        run: python -m pip install playwright

      - name: Validate required secrets
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          ROOT_PAGE_ID: ${{ secrets.ROOT_PAGE_ID }}
          SGE_CPF: ${{ secrets.SGE_CPF }}
          SGE_SENHA: ${{ secrets.SGE_SENHA }}
        run: |
          MISSING=""
          if [ -z "$NOTION_TOKEN" ]; then MISSING="$MISSING NOTION_TOKEN"; fi
          if [ -z "$ROOT_PAGE_ID" ]; then MISSING="$MISSING ROOT_PAGE_ID"; fi
          if [ -z "$SGE_CPF" ]; then MISSING="$MISSING SGE_CPF"; fi
          if [ -z "$SGE_SENHA" ]; then MISSING="$MISSING SGE_SENHA"; fi

          if [ -n "$MISSING" ]; then
            echo "Error: missing required secrets:$MISSING"
            exit 1
          fi

      - name: Install Playwright browser
        run: python -m playwright install chromium

      - name: Run launcher
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          ROOT_PAGE_ID: ${{ secrets.ROOT_PAGE_ID }}
          SGE_CPF: ${{ secrets.SGE_CPF }}
          SGE_SENHA: ${{ secrets.SGE_SENHA }}
          SGE_LOGIN_URL: ${{ github.event.inputs.sge_login_url || secrets.SGE_LOGIN_URL }}
          HEADLESS: "1"
          SGE_DEBUG_LOGIN: "1"
          SGE_DEBUG_DIR: artifacts/sge-login
          INPUT_ESCOLA: ${{ github.event.inputs.escola || '' }}
          INPUT_TURNO: ${{ github.event.inputs.turno || '' }}
          INPUT_TURMA: ${{ github.event.inputs.turma || '' }}
          INPUT_TRIMESTRE: ${{ github.event.inputs.trimestre || '' }}
          INPUT_NOTION_PAGE_ID: ${{ github.event.inputs.notion_page_id || '' }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          ARGS=("lancar_notas_sge.py")

          if [[ -n "$INPUT_ESCOLA" && "$INPUT_ESCOLA" != "Todas" ]]; then ARGS+=("--escola" "$INPUT_ESCOLA"); fi
          if [[ -n "$INPUT_TURNO" && "$INPUT_TURNO" != "Todos" ]]; then ARGS+=("--turno" "$INPUT_TURNO"); fi
          if [[ -n "$INPUT_TURMA" && "$INPUT_TURMA" != "Todas" ]]; then ARGS+=("--turma" "$INPUT_TURMA"); fi
          if [[ -n "$INPUT_TRIMESTRE" && "$INPUT_TRIMESTRE" != "Todos" ]]; then ARGS+=("--trimestre" "$INPUT_TRIMESTRE"); fi
          if [ -n "$INPUT_NOTION_PAGE_ID" ]; then ARGS+=("--notion-page-id" "$INPUT_NOTION_PAGE_ID"); fi
          if [ "$INPUT_DRY_RUN" = "true" ]; then ARGS+=("--dry-run"); fi

          echo "Executando python ${ARGS[*]}"
          python "${ARGS[@]}"

      - name: Upload login debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sge-login-debug-${{ github.run_id }}
          path: artifacts/sge-login/
          if-no-files-found: ignore
